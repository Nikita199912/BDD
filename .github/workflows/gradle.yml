name: Java CI with Gradle

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'adopt'

      # Шаг 1 (НОВЫЙ): Отладка - проверяем, что JAR-файл на месте и какие у него права
      - name: Debug - List artifacts directory
        run: |
          pwd
          ls -l artifacts/

      # Шаг 2 (НОВЫЙ): Даем JAR-файлу права на исполнение
      # Это часто нужно для скачанных/загруженных файлов на Linux-системах
      - name: Grant execute permission for SUT JAR
        run: chmod +x artifacts/app-ibank-build-for-testers.jar

      # Шаг 3: Запускаем SUT в фоне (он должен отработать после правок)
      - name: Start SUT (System Under Test)
        run: java -jar artifacts/app-ibank-build-for-testers.jar &

      # Шаг 4: Ждем, чтобы SUT успел стартовать
      - name: Wait for SUT to start
        run: sleep 10

      # Шаг 5: Запускаем автотесты
      - name: Build and Run Tests with Gradle
        run: ./gradlew test -Dselenide.headless=true